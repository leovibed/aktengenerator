<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aktengenerator | Narco County Sheriff Department</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            emerald: {
              400: '#34d399',
              500: '#10b981',
              600: '#059669',
              950: '#022c22',
            }
          }
        }
      }
    }
  </script>
  <!-- Alpine.js für Reaktivität -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen bg-neutral-950 text-neutral-100 font-sans" x-data="aktengenerator()">
  
  <header class="border-b border-neutral-800/80 bg-neutral-950/80 backdrop-blur sticky top-0 z-10">
    <div class="mx-auto max-w-7xl px-6 py-4 flex items-center gap-3">
      <div class="h-9 w-9 rounded-lg bg-emerald-500/15 text-emerald-400 grid place-items-center font-bold">★</div>
      <div class="min-w-0">
        <h1 class="text-sm sm:text-base font-semibold tracking-wide truncate">NARCO COUNTY SHERIFF DEPARTMENT</h1>
        <p class="text-[11px] uppercase tracking-[0.2em] text-emerald-400/80">Special Emergency Response Team · Aktengenerator</p>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-6 py-8 grid gap-6 lg:grid-cols-2">
    <!-- FORMULAR -->
    <section class="space-y-6">
      
      <!-- Aktenart -->
      <div class="rounded-2xl border border-neutral-800 bg-neutral-900/60 p-5 space-y-3">
        <h2 class="text-xs uppercase tracking-[0.2em] text-emerald-400/80">Aktenart</h2>
        <select x-model="aktenart" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none">
          <template x-for="art in aktenarten">
            <option :value="art" x-text="art"></option>
          </template>
        </select>
      </div>

      <!-- Tatort & Zeitraum -->
      <div class="rounded-2xl border border-neutral-800 bg-neutral-900/60 p-5 space-y-3">
        <h2 class="text-xs uppercase tracking-[0.2em] text-emerald-400/80">Tatort & Zeitraum</h2>
        <label class="block space-y-1.5">
          <span class="text-xs text-neutral-400">Ort</span>
          <select x-model="ortLabel" @change="handleOrtChange" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none">
            <template x-for="o in orte">
              <option :value="o.label" x-text="o.label"></option>
            </template>
          </select>
        </label>
        <template x-if="ortLabel === 'Eigene Angabe'">
          <label class="block space-y-1.5">
            <span class="text-xs text-neutral-400">Eigene Angabe</span>
            <input type="text" x-model="ortCustom" placeholder="Ort eingeben" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none">
          </label>
        </template>
        <div class="grid grid-cols-2 gap-3">
          <label class="block space-y-1.5">
            <span class="text-xs text-neutral-400">PLZ</span>
            <input type="text" x-model="plz" placeholder="PLZ" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none">
          </label>
          <label class="block space-y-1.5">
            <span class="text-xs text-neutral-400">Datum</span>
            <input type="text" x-model="datum" placeholder="TT.MM.JJJJ" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none">
          </label>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <label class="block space-y-1.5">
            <span class="text-xs text-neutral-400" x-text="aktenart === 'Fahndung' ? 'Uhrzeit' : 'Beginn'"></span>
            <input type="text" x-model="startZeit" placeholder="HH:MM" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none">
          </label>
          <template x-if="aktenart !== 'Fahndung'">
            <label class="block space-y-1.5">
              <span class="text-xs text-neutral-400">Ende</span>
              <input type="text" x-model="endZeit" placeholder="HH:MM" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none">
            </label>
          </template>
        </div>
      </div>

      <!-- Beschuldigte / TV -->
      <div class="rounded-2xl border border-neutral-800 bg-neutral-900/60 p-5 space-y-3">
        <h2 class="text-xs uppercase tracking-[0.2em] text-emerald-400/80">Beschuldigte / TV</h2>
        
        <!-- Schalter für Kollektivschnellakte: Altes Verfahren -->
        <template x-if="aktenart === 'Kollektivschnellakte'">
          <button type="button" @click="kollektivAltesVerfahren = !kollektivAltesVerfahren" class="w-full flex items-center justify-between rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2.5 text-left mb-2">
            <span class="text-sm text-neutral-200">Akte nach altem Verfahren</span>
            <span :class="kollektivAltesVerfahren ? 'bg-emerald-500' : 'bg-neutral-700'" class="relative inline-flex h-6 w-11 items-center rounded-full transition"><span :class="kollektivAltesVerfahren ? 'translate-x-5' : 'translate-x-0.5'" class="inline-block h-5 w-5 transform rounded-full bg-white transition"></span></span>
          </button>
        </template>

        <template x-if="!isKollektiv">
          <div class="grid grid-cols-3 gap-2">
            <template x-for="g in ['Männlich', 'Weiblich', 'Mehrere']">
              <button type="button" @click="geschlecht = g" :class="geschlecht === g ? 'border-emerald-500 bg-emerald-500/10 text-emerald-300' : 'border-neutral-800 bg-neutral-900 text-neutral-300'" class="rounded-lg border px-3 py-2 text-sm font-medium transition" x-text="g"></button>
            </template>
          </div>
        </template>

        <template x-if="!mehrere">
          <label class="block space-y-1.5">
            <span class="text-xs text-neutral-400">Abgenommene Gegenstände</span>
            <textarea x-model="einzelGegenstaende" placeholder="Liste der abgenommenen Gegenstände" rows="3" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></textarea>
          </label>
        </template>

        <template x-if="mehrere">
          <div class="space-y-3">
            <template x-for="(tv, i) in tvs" :key="tv.id">
              <div class="rounded-xl border border-neutral-800 bg-neutral-900/60 p-3 space-y-2">
                <div class="flex items-center justify-between">
                  <span class="text-xs uppercase tracking-wider text-emerald-400/80" x-text="'Tatverdächtiger ' + (i + 1)"></span>
                  <button type="button" @click="tvs = tvs.filter(x => x.id !== tv.id)" x-show="tvs.length > 1" class="text-neutral-500 hover:text-red-400">Löschen</button>
                </div>
                <input type="text" x-model="tv.name" placeholder="Vorname Nachname, Geb.: TT.MM.JJJJ" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none">
                <textarea x-model="tv.gegenstaende" placeholder="Abgenommene Gegenstände" rows="2" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></textarea>
              </div>
            </template>
            <button type="button" @click="tvs.push({id: Date.now(), name: '', gegenstaende: ''})" class="inline-flex items-center gap-2 rounded-lg border border-emerald-500/40 bg-emerald-500/10 px-3 py-2 text-sm font-medium text-emerald-300">TV hinzufügen</button>
          </div>
        </template>
      </div>

      <!-- Sachverhalt -->
      <template x-if="showSachverhalt">
        <div class="rounded-2xl border border-neutral-800 bg-neutral-900/60 p-5 space-y-3">
          <h2 class="text-xs uppercase tracking-[0.2em] text-emerald-400/80">Sachverhalt</h2>
          <textarea x-model="sachverhalt" placeholder="Sachverhalt aus Sicht des SERTs" rows="5" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></textarea>
        </div>
      </template>

      <!-- Fahndung Details -->
      <template x-if="aktenart === 'Fahndung'">
        <div class="rounded-2xl border border-neutral-800 bg-neutral-900/60 p-5 space-y-3">
          <h2 class="text-xs uppercase tracking-[0.2em] text-emerald-400/80">Fahndung</h2>
          <label class="block space-y-1.5"><span class="text-xs text-neutral-400">Grund der Fahndung</span><textarea x-model="fahndungGrund" rows="2" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></textarea></label>
          <div class="grid grid-cols-2 gap-3">
            <label class="block space-y-1.5"><span class="text-xs text-neutral-400">Name der verknüpften Akte</span><input type="text" x-model="fahndungAkteName" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></label>
            <label class="block space-y-1.5"><span class="text-xs text-neutral-400">Fall-ID</span><input type="text" x-model="fahndungFallId" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></label>
          </div>
          <label class="block space-y-1.5"><span class="text-xs text-neutral-400">Zweck der Fahndung</span><input type="text" x-model="fahndungZweck" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></label>
        </div>
      </template>

      <!-- Kollektiv Genehmigung (bleibt immer sichtbar bei Kollektivakten) -->
      <template x-if="isKollektiv">
        <div class="rounded-2xl border border-neutral-800 bg-neutral-900/60 p-5 space-y-3">
          <h2 class="text-xs uppercase tracking-[0.2em] text-emerald-400/80">Kollektiv-Genehmigung</h2>
          
          <template x-if="aktenart === 'Kollektivschnellakte' && kollektivAltesVerfahren">
            <label class="block space-y-1.5">
              <span class="text-xs text-neutral-400">Genehmigt durch (Dienstnummer)</span>
              <input type="text" x-model="kollAltesGenehmigtVon" placeholder="z.B. SD-01" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none">
            </label>
          </template>

          <template x-if="!(aktenart === 'Kollektivschnellakte' && kollektivAltesVerfahren)">
            <div class="grid grid-cols-2 gap-3">
              <label class="block space-y-1.5"><span class="text-xs text-neutral-400">Genehmigt von (DN)</span><input type="text" x-model="kollGenehmigtVon" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></label>
              <label class="block space-y-1.5"><span class="text-xs text-neutral-400">Uhrzeit</span><input type="text" x-model="kollGenehmigtUhrzeit" placeholder="HH:MM" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></label>
            </div>
          </template>
        </div>
      </template>

      <!-- Rechtliches -->
      <div class="rounded-2xl border border-neutral-800 bg-neutral-900/60 p-5 space-y-3">
        <h2 class="text-xs uppercase tracking-[0.2em] text-emerald-400/80">Rechte, Richter, Anwalt & Medizin</h2>
        <div class="grid grid-cols-2 gap-3">
          <label class="block space-y-1.5"><span class="text-xs text-neutral-400">Rechte vorgelesen von (DN)</span><input type="text" x-model="rechteVon" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></label>
          <label class="block space-y-1.5"><span class="text-xs text-neutral-400">Zeuge (DN)</span><input type="text" x-model="rechteZeuge" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></label>
        </div>
        
        <button type="button" @click="richterAnwesend = !richterAnwesend" class="w-full flex items-center justify-between rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2.5 text-left">
          <span class="text-sm text-neutral-200">Ist ein Richter anwesend?</span>
          <span :class="richterAnwesend ? 'bg-emerald-500' : 'bg-neutral-700'" class="relative inline-flex h-6 w-11 items-center rounded-full transition"><span :class="richterAnwesend ? 'translate-x-5' : 'translate-x-0.5'" class="inline-block h-5 w-5 transform rounded-full bg-white transition"></span></span>
        </button>
        <template x-if="!richterAnwesend">
          <label class="block space-y-1.5"><span class="text-xs text-neutral-400">Bestätigt durch (Dienstnummer)</span><input type="text" x-model="richterBestaetigtVon" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></label>
        </template>

        <button type="button" @click="anwaltGefordert = !anwaltGefordert" class="w-full flex items-center justify-between rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2.5 text-left">
          <span class="text-sm text-neutral-200">Anwalt gefordert?</span>
          <span :class="anwaltGefordert ? 'bg-emerald-500' : 'bg-neutral-700'" class="relative inline-flex h-6 w-11 items-center rounded-full transition"><span :class="anwaltGefordert ? 'translate-x-5' : 'translate-x-0.5'" class="inline-block h-5 w-5 transform rounded-full bg-white transition"></span></span>
        </button>
        <template x-if="anwaltGefordert">
          <label class="block space-y-1.5"><span class="text-xs text-neutral-400">Keiner verfügbar bestätigt durch (DN)</span><input type="text" x-model="anwaltBestaetigtVon" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></label>
        </template>

        <button type="button" @click="medizin = !medizin" class="w-full flex items-center justify-between rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2.5 text-left">
          <span class="text-sm text-neutral-200">Wurde medizinische Behandlung benötigt?</span>
          <span :class="medizin ? 'bg-emerald-500' : 'bg-neutral-700'" class="relative inline-flex h-6 w-11 items-center rounded-full transition"><span :class="medizin ? 'translate-x-5' : 'translate-x-0.5'" class="inline-block h-5 w-5 transform rounded-full bg-white transition"></span></span>
        </button>
      </div>

      <!-- Unterschrift -->
      <div class="rounded-2xl border border-neutral-800 bg-neutral-900/60 p-5 space-y-3">
        <h2 class="text-xs uppercase tracking-[0.2em] text-emerald-400/80">Gezeichnet von</h2>
        <div class="grid grid-cols-2 gap-3">
          <label class="block space-y-1.5"><span class="text-xs text-neutral-400">Name</span><input type="text" x-model="signName" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></label>
          <label class="block space-y-1.5"><span class="text-xs text-neutral-400">Dienstnummer</span><input type="text" x-model="signDN" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none"></label>
        </div>
        <label class="block space-y-1.5">
          <span class="text-xs text-neutral-400">Rang</span>
          <select x-model="signRang" class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 focus:border-emerald-500 focus:outline-none">
            <template x-for="r in raenge"><option :value="r" x-text="r"></option></template>
          </select>
        </label>
      </div>

    </section>

    <!-- LIVE-VORSCHAU -->
    <section class="lg:sticky lg:top-24 lg:self-start">
      <div class="rounded-2xl border border-neutral-800 bg-neutral-900/60 shadow-2xl overflow-hidden">
        <div class="flex items-center justify-between border-b border-neutral-800 px-4 py-3">
          <div>
            <p class="text-xs uppercase tracking-[0.2em] text-emerald-400/80">Live-Vorschau</p>
            <p class="text-sm text-neutral-300" x-text="aktenart"></p>
          </div>
          <button type="button" @click="copyOutput" class="inline-flex items-center gap-2 rounded-lg bg-emerald-500 px-3 py-2 text-sm font-semibold text-neutral-950 hover:bg-emerald-400 transition">
            <span x-text="copied ? 'Kopiert' : 'Akte kopieren'"></span>
          </button>
        </div>
        <pre class="p-4 text-[13px] leading-relaxed text-neutral-200 whitespace-pre-wrap font-mono max-h-[75vh] overflow-auto" x-text="output"></pre>
      </div>
    </section>
  </main>

  <footer class="py-8 text-center"><p class="text-[11px] text-neutral-600">made by Stitch</p></footer>

  <script>
    function todayDE() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${pad(d.getDate())}.${pad(d.getMonth() + 1)}.${d.getFullYear()}`;
    }

    function aktengenerator() {
      return {
        aktenarten: ["Schnellakte", "Strafakte", "Kollektivschnellakte", "Kollektivakte", "Bußgeldbescheid", "Fahndung"],
        aktenart: "Schnellakte",
        orte: [
          { label: "Hoover Laden", plz: "7326" },
          { label: "Westhighway Laden", plz: "5067" },
          { label: "Laden 1000", plz: "1000" },
          { label: "Laden 1012", plz: "1012" },
          { label: "Vespucci PD", plz: "8090" },
          { label: "Staatsbank", plz: "7090" },
          { label: "Roxwoodbank", plz: "988" },
          { label: "Juwelier", plz: "7251" },
          { label: "Staatsgefängnis", plz: "4000" },
          { label: "Eigene Angabe", plz: "" }
        ],
        raenge: [
          "Deputy Trainee I", "Deputy Trainee II", "Deputy", "Senior Deputy", "Corporal", "Sergeant", "Sergeant II", "Staff Sergeant", "Master Sergeant", "Trial Lieutenant", "Lieutenant", "Lieutenant II", "Master Lieutenant", "Captain", "Trial Commander", "Commander", "Chief Deputy", "Assistant Sheriff", "Undersheriff", "Sheriff"
        ],
        ortLabel: "Hoover Laden",
        ortCustom: "",
        plz: "7326",
        datum: todayDE(),
        startZeit: "",
        endZeit: "",
        geschlecht: "Männlich",
        einzelGegenstaende: "",
        tvs: [{ id: 1, name: "", gegenstaende: "" }],
        sachverhalt: "",
        fahndungGrund: "",
        fahndungAkteName: "",
        fahndungFallId: "",
        fahndungZweck: "Vollstreckung einer offenen Akte",
        kollGenehmigtVon: "",
        kollGenehmigtUhrzeit: "",
        kollektivAltesVerfahren: false,
        kollAltesGenehmigtVon: "",
        rechteVon: "",
        rechteZeuge: "",
        richterAnwesend: true,
        richterBestaetigtVon: "",
        anwaltGefordert: false,
        anwaltBestaetigtVon: "",
        medizin: false,
        signName: "",
        signDN: "SD-61",
        signRang: "Deputy",
        copied: false,

        get isKollektiv() { return this.aktenart === 'Kollektivakte' || this.aktenart === 'Kollektivschnellakte'; },
        get mehrere() { return (this.isKollektiv && !(this.aktenart === 'Kollektivschnellakte' && this.kollektivAltesVerfahren)) || this.geschlecht === 'Mehrere'; },
        get showSachverhalt() { return ['Strafakte', 'Kollektivakte', 'Bußgeldbescheid', 'Fahndung'].includes(this.aktenart); },

        handleOrtChange() {
          const found = this.orte.find(o => o.label === this.ortLabel);
          if (found && this.ortLabel !== 'Eigene Angabe') this.plz = found.plz;
          else this.plz = '';
        },

        get ortLine() {
          const label = this.ortLabel === 'Eigene Angabe' ? this.ortCustom : this.ortLabel;
          return `${label || '-'}${this.plz ? ` PLZ ${this.plz}` : ''}`;
        },

        get zeitraumLine() {
          return this.aktenart === 'Fahndung' 
            ? `Am ${this.datum} um ${this.startZeit || '--:--'} Uhr` 
            : `Am ${this.datum} von ${this.startZeit || '--:--'} Uhr bis ${this.endZeit || '--:--'} Uhr`;
        },

        get output() {
          const header = `⭐ NARCO COUNTY SHERIFF DEPARTMENT ⭐\n| - Special Emergency Response Team - |`;
          const tatort = `| Tatort und Zeitraum:|\n${this.ortLine}\n${this.zeitraumLine}`;
          const sachverhaltBlock = this.showSachverhalt ? `\n\n| Sachverhalt aus Sicht des SERTs: |\n${this.sachverhalt || '-'}` : '';
          const signBlock = `| Gezeichnet von:|\n${this.signName || '-'} | ${this.signDN} | ${this.signRang}`;

          const rechteSatz = this.mehrere
            ? `Die Rechte wurden den Beschuldigten durch ${this.rechteVon || '-'} im Beisein von ${this.rechteZeuge || '-'} verlesen und verstanden.`
            : `Die Rechte wurden dem Beschuldigten durch ${this.rechteVon || '-'} im Beisein von ${this.rechteZeuge || '-'} verlesen und verstanden.`;
          
          const anwaltSatz = this.mehrere
            ? (this.anwaltGefordert ? "Die Beschuldigten BESTANDEN auf einen Rechtsbeistand." : "Die Beschuldigten VERZICHTETEN auf einen Rechtsbeistand.")
            : (this.anwaltGefordert ? "Der Beschuldigte BESTAND auf einen Rechtsbeistand." : "Der Beschuldigte VERZICHTETE auf einen Rechtsbeistand.");

          const anwaltZusatz = this.anwaltGefordert ? `Keiner verfügbar bestätigt durch ${this.anwaltBestaetigtVon || '-'}.` : '';
          
          const medizinSatz = this.mehrere
            ? (this.medizin ? "Die Beschuldigten BENÖTIGTEN medizinische Versorgung." : "Die Beschuldigten VERZICHTETEN AUF medizinische Versorgung.")
            : (this.medizin ? "Der Beschuldigte BENÖTIGTE medizinische Versorgung." : "Der Beschuldigte VERZICHTETE AUF medizinische Versorgung.");

          const richterZeile = !this.richterAnwesend ? `Kein Haftrichter verfügbar - bestätigt von: ${this.richterBestaetigtVon || '-'}` : '';

          const bemerkungenLines = [rechteSatz, anwaltSatz, anwaltZusatz, medizinSatz, richterZeile].filter(Boolean).join('\n');

          if (this.aktenart === 'Fahndung') {
            return `${header}\n\n${tatort}${sachverhaltBlock}\n\n| Grund der Fahndung: |\n${this.fahndungGrund || '-'}\n\n| Verknüpfte Akte: |\n${this.fahndungAkteName || '-'} | Fall-ID: ${this.fahndungFallId || '-'}\n\n| Bemerkungen:|\n${rechteSatz}\nDer o.g. Beschuldigte ist flüchtig. Beim Antreffen des Beschuldigten ist dieser festzunehmen und über seine Rechte zu belehren und der gerechten Strafe zuzuführen.\n${medizinSatz}\nDer Zweck der Fahndung ist: ${this.fahndungZweck || '-'}.\n\n${signBlock}`;
          }

          if (this.isKollektiv) {
            if (this.aktenart === 'Kollektivschnellakte' && this.kollektivAltesVerfahren) {
              const gegenstaendeBlock = this.einzelGegenstaende || '-';
              const genehmigung = `| Genehmigung:|\nKollektivakte nach altem Recht genehmigt von: ${this.kollAltesGenehmigtVon || '-'}`;
              return `${header}\n\n${tatort}${sachverhaltBlock}\n\n| Abgenommene Gegenstände:|\n${gegenstaendeBlock}\n\n${genehmigung}\n\n| Bemerkungen:|\n${bemerkungenLines}\n\n${signBlock}`;
            }

            const tvBlocks = this.tvs.map((tv, i) => `| Tatverdächtiger ${i + 1}:|\n${tv.name || '-'}\nAbgenommene Gegenstände:\n${tv.gegenstaende || '-'}`).join('\n\n');
            const genehmigung = `| Genehmigung:|\nKollektivakte genehmigt von ${this.kollGenehmigtVon || '-'} um ${this.kollGenehmigtUhrzeit || '-'} Uhr.`;
            return `${header}\n\n${tatort}${sachverhaltBlock}\n\n${tvBlocks}\n\n${genehmigung}\n\n| Bemerkungen:|\n${bemerkungenLines}\n\n${signBlock}`;
          }

          const gegenstaendeBlock = this.mehrere 
            ? this.tvs.map((tv, i) => `Tatverdächtiger ${i + 1}: ${tv.name || '-'}\n${tv.gegenstaende || '-'}`).join('\n\n')
            : (this.einzelGegenstaende || '-');

          return `${header}\n\n${tatort}${sachverhaltBlock}\n\n| Abgenommene Gegenstände:|\n${gegenstaendeBlock}\n\n| Bemerkungen:|\n${bemerkungenLines}\n\n${signBlock}`;
        },

        copyOutput() {
          navigator.clipboard.writeText(this.output);
          this.copied = true;
          setTimeout(() => this.copied = false, 1600);
        }
      }
    }
  </script>
</body>
</html>
